<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>Jolyne</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;overflow:hidden;width:100vw;height:100vh;font-family:'Segoe UI',sans-serif;color:#fff;user-select:none;}
  #cc{position:fixed;inset:0;}
  canvas{display:block;width:100%!important;height:100%!important;}

  /* PICKER */
  #picker{position:fixed;inset:0;background:#000;z-index:280;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;}
  .ptitle{font-size:36px;letter-spacing:12px;font-weight:200;}
  .plist{display:flex;flex-direction:column;gap:12px;width:260px;}
  .pitem{border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:18px 24px;cursor:pointer;display:flex;align-items:center;gap:16px;transition:all 0.2s;background:rgba(255,255,255,0.03);}
  .pitem:active{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.4);}
  .pitem-icon{font-size:24px;}
  .pitem-name{font-size:16px;color:rgba(255,255,255,0.85);letter-spacing:1px;}
  .pitem-ext{font-size:11px;color:rgba(255,255,255,0.25);margin-top:2px;}
  #perr{font-size:12px;color:#ff6b6b;text-align:center;}

  /* LOADING */
  #loading{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:20px;transition:opacity 0.4s;}
  #loading.gone{display:none;}
  #loading.fade{opacity:0;pointer-events:none;}
  .lname{font-size:28px;font-weight:300;letter-spacing:8px;}
  .lbar-w{width:160px;height:2px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
  .lbar{height:100%;background:#fff;width:0%;transition:width 0.25s;}
  .lsub{font-size:11px;letter-spacing:4px;color:rgba(255,255,255,0.3);}

  /* BUTTONS */
  #mbtn{position:fixed;top:16px;left:16px;z-index:100;width:44px;height:44px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:12px;display:none;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;backdrop-filter:blur(10px);}
  #mbtn.v{display:flex;}
  #mbtn:active{background:rgba(255,255,255,0.18);}
  .bar{width:20px;height:2px;background:#fff;border-radius:2px;}
  #rbtn{position:fixed;bottom:20px;right:16px;z-index:100;width:44px;height:44px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:12px;display:none;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(10px);font-size:20px;}
  #rbtn.v{display:flex;}
  #rbtn:active{background:rgba(255,255,255,0.18);}

  /* CURRENT MODEL TAG */
  #model-tag{position:fixed;top:16px;right:16px;z-index:100;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:8px 14px;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.5);display:none;backdrop-filter:blur(10px);}
  #model-tag.v{display:block;}

  /* SIDE MENU */
  #menu{position:fixed;top:0;left:0;width:280px;height:100vh;background:rgba(10,10,10,0.97);backdrop-filter:blur(20px);border-right:1px solid rgba(255,255,255,0.07);z-index:200;transform:translateX(-100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);overflow-y:auto;padding:70px 0 40px;}
  #menu.open{transform:translateX(0);}
  #ov{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150;opacity:0;pointer-events:none;transition:opacity 0.35s;}
  #ov.open{opacity:1;pointer-events:all;}
  .ms{padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
  .ml{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.28);padding:12px 24px 6px;text-transform:uppercase;}
  .mi{display:flex;align-items:center;gap:14px;padding:14px 24px;font-size:15px;color:rgba(255,255,255,0.82);cursor:pointer;}
  .mi:active{background:rgba(255,255,255,0.07);}
  .mic{font-size:20px;width:24px;text-align:center;}
  .sr{padding:8px 24px;display:flex;flex-direction:column;gap:6px;}
  .sl{display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,0.45);}
  input[type=range]{width:100%;height:3px;accent-color:#fff;cursor:pointer;}
  .bgs{display:flex;gap:10px;padding:10px 24px;flex-wrap:wrap;}
  .sw{width:32px;height:32px;border-radius:8px;cursor:pointer;border:2px solid transparent;}
  .sw.a{border-color:#fff;}

  /* TOAST & HINT */
  #toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:10px 20px;font-size:13px;color:rgba(255,255,255,0.8);opacity:0;transition:all 0.3s;z-index:400;pointer-events:none;white-space:nowrap;}
  #toast.s{opacity:1;transform:translateX(-50%) translateY(0);}
  #hint{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,0.3);z-index:100;pointer-events:none;text-align:center;transition:opacity 1s;}
  #hint.h{opacity:0;}
</style>
</head>
<body>

<div id="picker">
  <div class="ptitle">JOLYNE</div>
  <div class="plist" id="plist"></div>
  <div id="perr"></div>
</div>

<div id="loading" class="gone">
  <div class="lname" id="lname">JOLYNE</div>
  <div class="lbar-w"><div class="lbar" id="lb"></div></div>
  <div class="lsub" id="lt">LOADING</div>
</div>

<div id="cc"></div>
<div id="mbtn" onclick="toggleMenu()"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
<div id="rbtn" onclick="resetPose()">↺</div>
<div id="model-tag"></div>
<div id="hint">Hold 1s to move head · Pinch to zoom</div>
<div id="ov" onclick="closeMenu()"></div>

<div id="menu">
  <div class="ms">
    <div class="ml">Model</div>
    <div class="mi" onclick="showPicker()"><span class="mic">🔄</span> Change model</div>
  </div>
  <div class="ms">
    <div class="ml">Background</div>
    <div class="bgs">
      <div class="sw a" style="background:#000" onclick="setBg('#000',this)"></div>
      <div class="sw" style="background:#0a0a1a" onclick="setBg('#0a0a1a',this)"></div>
      <div class="sw" style="background:#1a0010" onclick="setBg('#1a0010',this)"></div>
      <div class="sw" style="background:#0a1a0a" onclick="setBg('#0a1a0a',this)"></div>
      <div class="sw" style="background:#1a1208" onclick="setBg('#1a1208',this)"></div>
      <div class="sw" style="background:#fff" onclick="setBg('#fff',this)"></div>
    </div>
    <div class="mi" onclick="document.getElementById('bi').click();closeMenu()"><span class="mic">🖼️</span> Image background</div>
    <div class="mi" onclick="removeBg()"><span class="mic">✕</span> Remove background</div>
  </div>
  <div class="ms">
    <div class="ml">Image</div>
    <div class="sr"><div class="sl"><span>Brightness</span><span id="bv">100%</span></div><input type="range" min="50" max="200" value="100" id="br" oninput="uf()"></div>
    <div class="sr"><div class="sl"><span>Contrast</span><span id="cv">100%</span></div><input type="range" min="50" max="200" value="100" id="co" oninput="uf()"></div>
    <div class="sr"><div class="sl"><span>Saturation</span><span id="sv">100%</span></div><input type="range" min="0" max="200" value="100" id="sa" oninput="uf()"></div>
  </div>
  <div class="ms">
    <div class="ml">Animation</div>
    <div class="sr"><div class="sl"><span>Idle speed</span><span id="isv">1.0x</span></div><input type="range" min="1" max="30" value="10" id="isp" oninput="uis()"></div>
  </div>
</div>

<div id="toast"></div>
<input type="file" id="bi" accept="image/*" style="display:none" onchange="hbi(this)">

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@1.0.13/lib/three-vrm.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { VRM, VRMUtils } from '@pixiv/three-vrm';

// ===== RENDERER =====
const cc = document.getElementById('cc');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
cc.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
const camera = new THREE.PerspectiveCamera(28, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 1.3, 3.8);

scene.add(new THREE.AmbientLight(0xffffff, 0.9));
const dl = new THREE.DirectionalLight(0xffffff, 1.2);
dl.position.set(1, 2, 2); scene.add(dl);
const fl = new THREE.DirectionalLight(0xbbbbff, 0.35);
fl.position.set(-1, 0.5, -1); scene.add(fl);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.1, 0);
controls.enableDamping = true; controls.dampingFactor = 0.07;
controls.minDistance = 0.8; controls.maxDistance = 7;
controls.update();

let vrm = null, isp = 1, it = 0, bt = 0;
let nb = 2 + Math.random() * 3, blinking = false, bp = 0, boneMode = false;
const clock = new THREE.Clock();

function tick(dt) {
  if (!vrm) return;
  it += dt * isp; bt += dt;
  const h = vrm.humanoid;
  const breathe = Math.sin(it * 0.75) * 0.013;
  const chest = h.getBoneNode('chest'); if (chest) chest.rotation.x = breathe * 0.6;
  const spine = h.getBoneNode('spine'); if (spine) spine.rotation.x = breathe * 0.3;
  const hips = h.getBoneNode('hips');
  if (hips) { hips.rotation.z = Math.sin(it * 0.38) * 0.007; hips.position.y = Math.sin(it * 0.75) * 0.002; }
  if (!boneMode) {
    const head = h.getBoneNode('head');
    if (head) {
      head.rotation.y += (Math.sin(it * 0.28) * 0.025 - head.rotation.y) * 0.03;
      head.rotation.z += (Math.sin(it * 0.45) * 0.012 - head.rotation.z) * 0.03;
    }
  }
  if (bt >= nb) { blinking = true; bp = 0; bt = 0; nb = 2.5 + Math.random() * 4; }
  if (blinking && vrm.blendShapeProxy) {
    bp += dt * 9;
    const bv = bp < Math.PI ? Math.sin(bp) : 0;
    try { vrm.blendShapeProxy.setValue('blink', bv); } catch(e) {}
    if (bp >= Math.PI) { blinking = false; try { vrm.blendShapeProxy.setValue('blink', 0); } catch(e) {} }
  }
  vrm.update(dt);
}

(function loop() {
  requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), 0.05);
  tick(dt); controls.update();
  renderer.render(scene, camera);
})();

// ===== LOAD VRM FROM URL (servidor Netlify) =====
const loader = new GLTFLoader();

function sp(p, t) {
  document.getElementById('lb').style.width = p + '%';
  document.getElementById('lt').textContent = t;
}

window.loadVrmByName = function(filename) {
  const name = filename.replace('.vrm', '');
  document.getElementById('picker').style.display = 'none';
  const ld = document.getElementById('loading');
  ld.classList.remove('gone', 'fade'); ld.style.opacity = '1';
  document.getElementById('lname').textContent = name.toUpperCase();
  sp(10, 'LOADING...');
  closeMenu();

  if (vrm) { scene.remove(vrm.scene); VRMUtils.deepDispose(vrm.scene); vrm = null; }

  loader.load('./' + filename, (gltf) => {
    sp(85, 'BUILDING...');
    VRM.from(gltf).then((model) => {
      VRMUtils.removeUnnecessaryVertices(model.scene);
      VRMUtils.removeUnnecessaryJoints(model.scene);
      vrm = model;
      scene.add(vrm.scene);

      const box = new THREE.Box3().setFromObject(vrm.scene);
      const size = box.getSize(new THREE.Vector3());
      vrm.scene.position.y = -box.min.y;
      controls.target.set(0, size.y * 0.55, 0);
      controls.update();

      sp(100, 'READY');
      const ld = document.getElementById('loading');
      ld.classList.add('fade');
      setTimeout(() => ld.classList.add('gone'), 400);
      document.getElementById('mbtn').classList.add('v');
      document.getElementById('rbtn').classList.add('v');
      const tag = document.getElementById('model-tag');
      tag.textContent = name.toUpperCase();
      tag.classList.add('v');
      setTimeout(() => document.getElementById('hint').classList.add('h'), 5000);
      toast(name + ' loaded ✓');
    }).catch(err => {
      console.error(err);
      showErr('VRM error — try re-exporting from VRoid.');
    });
  }, (pg) => {
    if (pg.total > 0) sp(10 + (pg.loaded / pg.total) * 70, 'LOADING...');
  }, (err) => {
    console.error(err);
    showErr('Failed to load ' + filename);
  });
};

function showErr(msg) {
  const ld = document.getElementById('loading');
  ld.classList.add('fade');
  setTimeout(() => ld.classList.add('gone'), 400);
  document.getElementById('picker').style.display = 'flex';
  const e = document.getElementById('perr');
  e.textContent = msg; e.style.display = 'block';
}

window.showPicker = function() {
  document.getElementById('picker').style.display = 'flex';
  closeMenu();
};

// Carrega lista de VRMs do JSON
fetch('./vrm-list.json')
  .then(r => r.json())
  .then(list => {
    const plist = document.getElementById('plist');
    plist.innerHTML = '';
    list.forEach(filename => {
      const name = filename.replace('.vrm', '');
      const div = document.createElement('div');
      div.className = 'pitem';
      div.innerHTML = `<span class="pitem-icon">🧊</span><div><div class="pitem-name">${name.toUpperCase()}</div><div class="pitem-ext">.vrm</div></div>`;
      div.onclick = () => loadVrmByName(filename);
      plist.appendChild(div);
    });
  })
  .catch(() => {
    document.getElementById('perr').textContent = 'Could not load model list.';
    document.getElementById('perr').style.display = 'block';
  });

// ===== BG IMAGE =====
window.hbi = function(i) {
  if (!i.files[0]) return;
  const fr = new FileReader();
  fr.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const tex = new THREE.Texture(img);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.needsUpdate = true;
      scene.background = tex;
      toast('Background applied ✓');
    };
    img.src = e.target.result;
  };
  fr.readAsDataURL(i.files[0]);
};

window.uf = function() {
  const b = document.getElementById('br').value, c = document.getElementById('co').value, s = document.getElementById('sa').value;
  document.getElementById('bv').textContent = b + '%';
  document.getElementById('cv').textContent = c + '%';
  document.getElementById('sv').textContent = s + '%';
  renderer.domElement.style.filter = `brightness(${b}%) contrast(${c}%) saturate(${s}%)`;
};

window.uis = function() { const v = document.getElementById('isp').value; isp = v / 10; document.getElementById('isv').textContent = isp.toFixed(1) + 'x'; };

window.resetPose = function() {
  if (!vrm) return;
  const h = vrm.humanoid;
  ['hips','spine','chest','neck','head','leftUpperArm','leftLowerArm','rightUpperArm','rightLowerArm'].forEach(b => {
    const n = h.getBoneNode(b); if (n) n.rotation.set(0, 0, 0);
  });
  toast('Pose reset');
};

window.setBg = function(hex, el) {
  document.querySelectorAll('.sw').forEach(s => s.classList.remove('a'));
  el.classList.add('a'); scene.background = new THREE.Color(hex);
};

window.removeBg = function() { scene.background = null; toast('Background removed'); closeMenu(); };

// ===== TOUCH HEAD CONTROL =====
let lpt = null, to = null;
renderer.domElement.addEventListener('touchstart', e => {
  if (e.touches.length !== 1) return;
  to = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  lpt = setTimeout(() => { controls.enabled = false; boneMode = true; navigator.vibrate && navigator.vibrate(40); toast('Head control — drag to move'); }, 500);
}, { passive: true });

renderer.domElement.addEventListener('touchmove', e => {
  if (lpt && (Math.abs(e.touches[0].clientX - to.x) > 10 || Math.abs(e.touches[0].clientY - to.y) > 10)) { clearTimeout(lpt); lpt = null; }
  if (!boneMode || !vrm || e.touches.length !== 1) return;
  e.preventDefault();
  const nx = (e.touches[0].clientX / innerWidth - 0.5) * 2;
  const ny = (e.touches[0].clientY / innerHeight - 0.5) * 2;
  const head = vrm.humanoid.getBoneNode('head');
  if (head) { head.rotation.y = THREE.MathUtils.clamp(nx * 0.9, -0.8, 0.8); head.rotation.x = THREE.MathUtils.clamp(ny * 0.7, -0.45, 0.35); }
}, { passive: false });

renderer.domElement.addEventListener('touchend', () => {
  if (lpt) { clearTimeout(lpt); lpt = null; }
  if (boneMode) { boneMode = false; controls.enabled = true; toast('Orbit mode'); }
});

window.addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('s'); setTimeout(() => t.classList.remove('s'), 2500); }
window.toast = toast;
</script>

<script>
function toggleMenu() { document.getElementById('menu').classList.toggle('open'); document.getElementById('ov').classList.toggle('open'); }
function closeMenu() { document.getElementById('menu').classList.remove('open'); document.getElementById('ov').classList.remove('open'); }
</script>
</body>
</html>
